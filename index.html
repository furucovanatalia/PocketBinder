<!doctype html><html lang="sk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PocketBinder</title><style>
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#1a1328,#090a0e 42%);color:#fff;font:16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{max-width:430px;min-height:100vh;margin:auto;padding:28px 20px}.screen{display:none}.screen.active{display:block;animation:a .25s}@keyframes a{from{opacity:0;transform:translateY(8px)}}.brand{text-align:center;padding-top:55px}.logo{width:105px;height:125px;margin:auto;background:linear-gradient(145deg,#25262d,#0b0c10);border-radius:20px;box-shadow:0 20px 55px #000,0 0 35px #9653ed44;position:relative}.logo:before{content:"";position:absolute;inset:25px 24px 35px;border:3px solid #9b59f2;border-radius:9px}.logo:after{content:"";position:absolute;right:-8px;top:53px;width:28px;height:28px;border-radius:9px;background:#292a31}h1{font-size:38px;margin:26px 0 8px;letter-spacing:-2px}.v{color:#9b59f2}.tag{color:#a2a4ad;margin-bottom:48px}.action{width:100%;height:70px;border:1px solid #292b34;border-radius:17px;background:#15161c;color:#fff;margin:12px 0;padding:0 18px;display:flex;align-items:center;gap:15px;font-weight:650}.primary,.create{background:linear-gradient(135deg,#a45cf3,#6d35bd);border:0}.ico{font-size:25px}.arrow{margin-left:auto;font-size:26px}.top{display:flex;align-items:center;padding:8px 0 25px}.back{border:0;background:none;color:white;font-size:30px}.top h2{font-size:20px;margin:auto;transform:translateX(-15px)}label{display:block;font-size:14px;font-weight:650;margin:18px 0 9px}.field{width:100%;height:52px;border:1px solid #2b2d35;background:#121319;color:#fff;border-radius:13px;padding:0 15px}.preview{width:145px;height:175px;margin:5px auto 28px;border-radius:16px;background:#17181d;box-shadow:0 18px 38px #000}.colors,.layouts{display:flex;gap:12px}.color{width:44px;height:44px;border-radius:50%;border:4px solid transparent}.selected{box-shadow:0 0 0 2px #fff}.layout{flex:1;height:85px;border:1px solid #2b2d35;border-radius:13px;background:#121319;color:#aaa}.layout.on{border-color:#9b59f2;color:#fff}.create{width:100%;height:56px;border-radius:14px;color:#fff;margin-top:28px;font-weight:700}.albums{display:grid;grid-template-columns:1fr 1fr;gap:20px 15px}.card{border:0;background:none;color:#fff;text-align:left}.book{height:180px;border-radius:10px 18px 18px 10px;box-shadow:0 16px 28px #0009;border-left:8px solid #ffffff12}.card b{display:block;margin-top:9px}.card small,.empty,.pageLabel{color:#9295a1}.empty{text-align:center;padding-top:100px}.pageLabel{text-align:center}.page{margin:20px auto;background:#07080a;border:1px solid #2b2d34;border-radius:14px;padding:11px;display:grid;gap:8px;aspect-ratio:.72;box-shadow:0 22px 50px #000}.pocket{border:1px dashed #3a3c44;border-radius:6px;display:grid;place-items:center;color:#484a53;font-size:28px;background:#0e0f12}.pager{display:flex;justify-content:space-between;align-items:center}.nav,.newpage{border:1px solid #31333c;background:#171820;color:#fff}.nav{width:54px;height:54px;border-radius:50%;font-size:25px}.newpage{padding:13px 18px;border-radius:14px}

.style-options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.style-choice{height:108px;border:1px solid #2b2d35;border-radius:14px;background:#121319;color:#aaa;padding:10px}
.style-choice.on{border-color:#9b59f2;color:#fff;box-shadow:inset 0 0 0 1px #9b59f2}
.style-demo{height:57px;margin:0 auto 7px;width:58px;border-radius:6px;background:#08090b;position:relative;border:1px solid #333640}
.style-demo.realistic:before{content:"";position:absolute;inset:-5px;background:var(--demo-color,#17181d);border-radius:8px;z-index:-1}
.style-demo.realistic:after{content:"○\A○\A○\A○";white-space:pre;position:absolute;left:-12px;top:2px;line-height:13px;color:#b8bbc5;font-size:12px}
.page-wrap{position:relative;margin:20px auto 18px;padding:0}
.page-wrap.realistic{padding:9px 8px 9px 21px;border-radius:17px;background:var(--binder-color,#17181d);box-shadow:0 22px 50px #000}
.page-wrap.realistic:before{content:"○  ○  ○  ○";position:absolute;left:2px;top:50%;transform:translateY(-50%);width:17px;white-space:pre-wrap;line-height:48px;color:#c1c4cc;font-size:15px;text-shadow:0 1px 3px #000}
.page-wrap .page{margin:0}

</style></head><body><main class="app">
<section id="home" class="screen active"><div class="brand"><div class="logo"></div><h1>Pocket<span class="v">Binder</span></h1><div class="tag">Your collection. Your binder. Your way.</div></div><button class="action primary" onclick="show('create')"><span class="ico">＋</span>New Album<span class="arrow">›</span></button><button class="action" onclick="renderAlbums();show('albums')"><span class="ico">▣</span>My Albums<span class="arrow">›</span></button><button class="action" onclick="alert('Settings prídu v ďalšej verzii ✨')"><span class="ico">⚙</span>Settings<span class="arrow">›</span></button></section>
<section id="create" class="screen"><div class="top"><button class="back" onclick="show('home')">‹</button><h2>Create New Album</h2></div><div class="preview" id="preview"></div><label>Album Name</label><input id="albumName" class="field" placeholder="My New Album"><label>Choose Color</label><div class="colors"><button class="color selected" data-color="#17181d" style="background:#17181d"></button><button class="color" data-color="#2563b9" style="background:#2563b9"></button><button class="color" data-color="#db5e9e" style="background:#db5e9e"></button><button class="color" data-color="#f28b2d" style="background:#f28b2d"></button></div><label>Binder Style</label><div class="style-options"><button class="style-choice on" data-style="clean"><div class="style-demo"></div>Clean</button><button class="style-choice" data-style="realistic"><div class="style-demo realistic" id="realisticDemo"></div>Realistic</button></div><label>Page Layout</label><div class="layouts"><button class="layout" data-layout="2">▦<br>2 × 2</button><button class="layout on" data-layout="3">▦<br>3 × 3</button><button class="layout" data-layout="4">▦<br>4 × 4</button></div><button class="create" onclick="createAlbum()">Create Album</button></section>
<section id="albums" class="screen"><div class="top"><button class="back" onclick="show('home')">‹</button><h2>My Albums</h2></div><div id="albumList"></div></section>
<section id="binder" class="screen"><div class="top"><button class="back" onclick="renderAlbums();show('albums')">‹</button><h2 id="binderTitle">Album</h2></div><div id="pageLabel" class="pageLabel"></div><div id="pageWrap" class="page-wrap"><div id="page" class="page"></div></div><div class="pager"><button class="nav" onclick="prevPage()">‹</button><button class="newpage" onclick="addPage()">＋ New Page</button><button class="nav" onclick="nextPage()">›</button></div></section>
</main><script>
let albums=JSON.parse(localStorage.getItem("pb-albums")||"[]"),current=0,pageNo=1,color="#17181d",layout=3,binderStyle="clean";
function show(id){document.querySelectorAll(".screen").forEach(x=>x.classList.toggle("active",x.id===id));scrollTo(0,0)}
document.querySelectorAll(".color").forEach(b=>b.onclick=()=>{document.querySelectorAll(".color").forEach(x=>x.classList.remove("selected"));b.classList.add("selected");color=b.dataset.color;preview.style.background=color;document.getElementById("realisticDemo").style.setProperty("--demo-color",color)});
document.querySelectorAll(".layout").forEach(b=>b.onclick=()=>{document.querySelectorAll(".layout").forEach(x=>x.classList.remove("on"));b.classList.add("on");layout=+b.dataset.layout});
document.querySelectorAll(".style-choice").forEach(b=>b.onclick=()=>{document.querySelectorAll(".style-choice").forEach(x=>x.classList.remove("on"));b.classList.add("on");binderStyle=b.dataset.style});
function save(){localStorage.setItem("pb-albums",JSON.stringify(albums))}
function createAlbum(){albums.push({name:albumName.value.trim()||"My New Album",color,layout,style:binderStyle,pages:1});save();current=albums.length-1;pageNo=1;openBinder()}
function renderAlbums(){albumList.innerHTML=albums.length?'<div class="albums">'+albums.map((a,i)=>`<button class="card" onclick="current=${i};pageNo=1;openBinder()"><div class="book" style="background:${a.color}"></div><b>${a.name}</b><small>${a.pages} page${a.pages===1?"":"s"} · ${a.layout}×${a.layout}</small></button>`).join("")+"</div>":'<div class="empty">Your shelf is empty.<br>Create your first binder ✨</div>'}
function openBinder(){binderTitle.textContent=albums[current].name;renderPage();show("binder")}
function renderPage(){let a=albums[current];pageLabel.textContent=`Page ${pageNo} / ${a.pages}`;pageWrap.className="page-wrap "+((a.style||"clean")==="realistic"?"realistic":"");pageWrap.style.setProperty("--binder-color",a.color);page.style.gridTemplateColumns=`repeat(${a.layout},1fr)`;page.innerHTML=Array(a.layout*a.layout).fill('<div class="pocket">＋</div>').join("")}
function addPage(){albums[current].pages++;pageNo=albums[current].pages;save();renderPage()}function nextPage(){if(pageNo<albums[current].pages){pageNo++;renderPage()}}function prevPage(){if(pageNo>1){pageNo--;renderPage()}}
</script></body></html>
