<!doctype html><html lang="sk"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PocketBinder</title><style>
*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at top,#1a1328,#090a0e 42%);color:#fff;font:16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.app{max-width:430px;min-height:100vh;margin:auto;padding:28px 20px}.screen{display:none}.screen.active{display:block;animation:a .25s}@keyframes a{from{opacity:0;transform:translateY(8px)}}.brand{text-align:center;padding-top:55px}.logo{width:105px;height:125px;margin:auto;background:linear-gradient(145deg,#25262d,#0b0c10);border-radius:20px;box-shadow:0 20px 55px #000,0 0 35px #9653ed44;position:relative}.logo:before{content:"";position:absolute;inset:25px 24px 35px;border:3px solid #9b59f2;border-radius:9px}.logo:after{content:"";position:absolute;right:-8px;top:53px;width:28px;height:28px;border-radius:9px;background:#292a31}h1{font-size:38px;margin:26px 0 8px;letter-spacing:-2px}.v{color:#9b59f2}.tag{color:#a2a4ad;margin-bottom:48px}.action{width:100%;height:70px;border:1px solid #292b34;border-radius:17px;background:#15161c;color:#fff;margin:12px 0;padding:0 18px;display:flex;align-items:center;gap:15px;font-weight:650}.primary,.create{background:linear-gradient(135deg,#a45cf3,#6d35bd);border:0}.ico{font-size:25px}.arrow{margin-left:auto;font-size:26px}.top{display:flex;align-items:center;padding:8px 0 25px}.back{border:0;background:none;color:white;font-size:30px}.top h2{font-size:20px;margin:auto;transform:translateX(-15px)}label{display:block;font-size:14px;font-weight:650;margin:18px 0 9px}.field{width:100%;height:52px;border:1px solid #2b2d35;background:#121319;color:#fff;border-radius:13px;padding:0 15px}.preview{width:145px;height:175px;margin:5px auto 28px;border-radius:16px;background:#17181d;box-shadow:0 18px 38px #000}.colors,.layouts{display:flex;gap:12px}.color{width:44px;height:44px;border-radius:50%;border:4px solid transparent}.selected{box-shadow:0 0 0 2px #fff}.layout{flex:1;height:85px;border:1px solid #2b2d35;border-radius:13px;background:#121319;color:#aaa}.layout.on{border-color:#9b59f2;color:#fff}.create{width:100%;height:56px;border-radius:14px;color:#fff;margin-top:28px;font-weight:700}.albums{display:grid;grid-template-columns:1fr 1fr;gap:20px 15px}.card{border:0;background:none;color:#fff;text-align:left}.book{height:180px;border-radius:10px 18px 18px 10px;box-shadow:0 16px 28px #0009;border-left:8px solid #ffffff12}.card b{display:block;margin-top:9px}.card small,.empty,.pageLabel{color:#9295a1}.empty{text-align:center;padding-top:100px}.pageLabel{text-align:center}.page{margin:20px auto;background:#07080a;border:1px solid #2b2d34;border-radius:14px;padding:11px;display:grid;gap:8px;aspect-ratio:.72;box-shadow:0 22px 50px #000}.pocket{border:1px dashed #3a3c44;border-radius:6px;display:grid;place-items:center;color:#484a53;font-size:28px;background:#0e0f12}.pager{display:flex;justify-content:space-between;align-items:center}.nav,.newpage{border:1px solid #31333c;background:#171820;color:#fff}.nav{width:54px;height:54px;border-radius:50%;font-size:25px}.newpage{padding:13px 18px;border-radius:14px}

.style-options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.style-choice{height:108px;border:1px solid #2b2d35;border-radius:14px;background:#121319;color:#aaa;padding:10px}
.style-choice.on{border-color:#9b59f2;color:#fff;box-shadow:inset 0 0 0 1px #9b59f2}
.style-demo{height:57px;margin:0 auto 7px;width:58px;border-radius:6px;background:#08090b;position:relative;border:1px solid #333640}
.style-demo.realistic:before{content:"";position:absolute;inset:-5px;background:var(--demo-color,#17181d);border-radius:8px;z-index:-1}
.style-demo.realistic:after{content:"○\A○\A○\A○";white-space:pre;position:absolute;left:-12px;top:2px;line-height:13px;color:#b8bbc5;font-size:12px}
.page-wrap{position:relative;margin:20px auto 18px;padding:0}
.page-wrap.realistic{padding:9px 8px 9px 21px;border-radius:17px;background:var(--binder-color,#17181d);box-shadow:0 22px 50px #000}
.page-wrap.realistic:before{content:"○  ○  ○  ○";position:absolute;left:2px;top:50%;transform:translateY(-50%);width:17px;white-space:pre-wrap;line-height:48px;color:#c1c4cc;font-size:15px;text-shadow:0 1px 3px #000}
.page-wrap .page{margin:0}


/* PocketBinder v0.3 — Cards */
#binder{margin-left:-10px;margin-right:-10px}
#binder .top{padding:4px 10px 4px}
#binder .top h2{font-size:18px}
#binder .page-wrap{width:100%;margin:5px auto 8px;touch-action:pan-y;overflow:hidden}
#binder .page-wrap.realistic{padding:8px 7px 8px 20px}
#binder .page{aspect-ratio:.715;padding:8px;gap:6px}
.pocket{position:relative;overflow:hidden;padding:0;border-style:solid}
.pocket img{width:100%;height:100%;object-fit:cover;display:block}
.pocket.has-card{border-color:#272931}
.pocket input{position:absolute;inset:0;width:100%;height:100%;opacity:0;display:block;font-size:0;cursor:pointer}.pocket{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
.pager{display:grid;grid-template-columns:34px 1fr 34px;align-items:center;gap:10px;padding:0 8px}
.nav,.addPage{width:34px;height:34px;border:1px solid #31333c;background:#171820;color:#fff;border-radius:50%;font-size:19px;padding:0}
.pageCenter{display:flex;justify-content:center;align-items:center;gap:12px}
.pageCount{font-size:13px;color:#9295a1}
.addPage{font-size:20px}
.slide-left{animation:slideLeft .22s ease}
.slide-right{animation:slideRight .22s ease}
@keyframes slideLeft{from{opacity:.35;transform:translateX(24px) rotateY(-2deg)}to{opacity:1;transform:none}}
@keyframes slideRight{from{opacity:.35;transform:translateX(-24px) rotateY(2deg)}to{opacity:1;transform:none}}
.edge-left{animation:bumpLeft .18s ease}
.edge-right{animation:bumpRight .18s ease}
@keyframes bumpLeft{50%{transform:translateX(-9px)}}
@keyframes bumpRight{50%{transform:translateX(9px)}}


/* v0.3.1 — Adjust Card */
.modal{position:fixed;inset:0;background:#08090df2;z-index:50;display:none;flex-direction:column;padding:max(18px,env(safe-area-inset-top)) 16px max(18px,env(safe-area-inset-bottom))}
.modal.open{display:flex}.modalTop{display:flex;align-items:center;justify-content:space-between;height:48px}.modalTop h3{margin:0;font-size:18px}.modalBtn{border:0;background:none;color:#fff;font-weight:650;font-size:16px}.modalBtn.done{color:#b978ff}.adjustHelp{text-align:center;color:#a5a7b0;font-size:13px;margin:6px 0 12px}.adjustStage{position:relative;flex:1;min-height:0;display:grid;place-items:center}.adjustCanvas{max-width:100%;max-height:100%;display:block;touch-action:none;border-radius:8px}.corner{position:absolute;width:30px;height:30px;border:3px solid #fff;background:#9b59f2;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 2px 12px #000;touch-action:none}.corner:after{content:"";position:absolute;inset:7px;border-radius:50%;background:#fff}.quadLine{position:absolute;height:2px;background:#b978ff;transform-origin:0 50%;pointer-events:none}.sheetBackdrop{position:fixed;inset:0;background:#0008;z-index:60;display:none}.sheetBackdrop.open{display:block}.cardSheet{position:absolute;left:12px;right:12px;bottom:max(12px,env(safe-area-inset-bottom));background:#1b1c23;border:1px solid #33353e;border-radius:20px;padding:8px;box-shadow:0 24px 60px #000}.sheetAction{width:100%;height:54px;border:0;border-bottom:1px solid #30323a;background:none;color:#fff;text-align:left;padding:0 16px;font-size:16px}.sheetAction:last-child{border-bottom:0}.sheetAction.delete{color:#ff6969}

</style></head><body><main class="app">
<section id="home" class="screen active"><div class="brand"><div class="logo"></div><h1>Pocket<span class="v">Binder</span></h1><div class="tag">Your collection. Your binder. Your way.</div></div><button class="action primary" onclick="show('create')"><span class="ico">＋</span>New Album<span class="arrow">›</span></button><button class="action" onclick="renderAlbums();show('albums')"><span class="ico">▣</span>My Albums<span class="arrow">›</span></button><button class="action" onclick="alert('Settings prídu v ďalšej verzii ✨')"><span class="ico">⚙</span>Settings<span class="arrow">›</span></button></section>
<section id="create" class="screen"><div class="top"><button class="back" onclick="show('home')">‹</button><h2>Create New Album</h2></div><div class="preview" id="preview"></div><label>Album Name</label><input id="albumName" class="field" placeholder="My New Album"><label>Choose Color</label><div class="colors"><button class="color selected" data-color="#17181d" style="background:#17181d"></button><button class="color" data-color="#2563b9" style="background:#2563b9"></button><button class="color" data-color="#db5e9e" style="background:#db5e9e"></button><button class="color" data-color="#f28b2d" style="background:#f28b2d"></button></div><label>Binder Style</label><div class="style-options"><button class="style-choice on" data-style="clean"><div class="style-demo"></div>Clean</button><button class="style-choice" data-style="realistic"><div class="style-demo realistic" id="realisticDemo"></div>Realistic</button></div><label>Page Layout</label><div class="layouts"><button class="layout" data-layout="2">▦<br>2 × 2</button><button class="layout on" data-layout="3">▦<br>3 × 3</button><button class="layout" data-layout="4">▦<br>4 × 4</button></div><button class="create" onclick="createAlbum()">Create Album</button></section>
<section id="albums" class="screen"><div class="top"><button class="back" onclick="show('home')">‹</button><h2>My Albums</h2></div><div id="albumList"></div></section>
<section id="binder" class="screen"><div class="top"><button class="back" onclick="renderAlbums();show('albums')">‹</button><h2 id="binderTitle">Album</h2></div><div id="pageLabel" class="pageLabel"></div><div id="pageWrap" class="page-wrap"><div id="page" class="page"></div></div><div class="pager"><button class="nav" onclick="prevPage()">‹</button><div class="pageCenter"><span id="pageCount" class="pageCount">1 / 1</span><button class="addPage" onclick="addPage()" aria-label="New page">＋</button></div><button class="nav" onclick="nextPage()">›</button></div></section>
<div id="adjustModal" class="modal"><div class="modalTop"><button class="modalBtn" onclick="cancelAdjust()">Cancel</button><h3>Adjust Card</h3><button class="modalBtn done" onclick="saveAdjust()">Done</button></div><div class="adjustHelp">Move the 4 points to the card corners</div><div id="adjustStage" class="adjustStage"><canvas id="adjustCanvas" class="adjustCanvas"></canvas><div id="quadLines"></div><button class="corner" data-corner="0"></button><button class="corner" data-corner="1"></button><button class="corner" data-corner="2"></button><button class="corner" data-corner="3"></button></div></div><input id="globalCardPicker" type="file" accept="image/*" style="display:none" onchange="globalCardChosen(this)"><div id="cardSheetBackdrop" class="sheetBackdrop" onclick="closeCardMenu(event)"><div class="cardSheet"><button class="sheetAction" onclick="adjustExisting()">Adjust corners</button><button class="sheetAction" onclick="replaceCard()">Replace photo</button><button class="sheetAction delete" onclick="deleteCard()">Delete card</button><button class="sheetAction" onclick="hideCardMenu()">Cancel</button></div></div></main><script>
let albums=JSON.parse(localStorage.getItem("pb-albums")||"[]"),current=0,pageNo=1,color="#17181d",layout=3,binderStyle="clean",db;
let adjustSlot=null,adjustFile=null,adjustImage=null,adjustPoints=[],menuSlot=null,pickerSlot=null,longTimer=null,longTriggered=false;
albums=albums.map((a,i)=>({...a,id:a.id||("legacy-"+i),style:a.style||"clean",pages:a.pages||1}));save();
function show(id){document.querySelectorAll(".screen").forEach(x=>x.classList.toggle("active",x.id===id));scrollTo(0,0)}
document.querySelectorAll(".color").forEach(b=>b.onclick=()=>{document.querySelectorAll(".color").forEach(x=>x.classList.remove("selected"));b.classList.add("selected");color=b.dataset.color;preview.style.background=color;document.getElementById("realisticDemo").style.setProperty("--demo-color",color)});
document.querySelectorAll(".layout").forEach(b=>b.onclick=()=>{document.querySelectorAll(".layout").forEach(x=>x.classList.remove("on"));b.classList.add("on");layout=+b.dataset.layout});
document.querySelectorAll(".style-choice").forEach(b=>b.onclick=()=>{document.querySelectorAll(".style-choice").forEach(x=>x.classList.remove("on"));b.classList.add("on");binderStyle=b.dataset.style});
function save(){localStorage.setItem("pb-albums",JSON.stringify(albums))}
function createAlbum(){albums.push({id:String(Date.now()),name:albumName.value.trim()||"My New Album",color,layout,style:binderStyle,pages:1});save();current=albums.length-1;pageNo=1;openBinder()}
function renderAlbums(){albumList.innerHTML=albums.length?'<div class="albums">'+albums.map((a,i)=>`<button class="card" onclick="current=${i};pageNo=1;openBinder()"><div class="book" style="background:${a.color}"></div><b>${a.name}</b><small>${a.pages} page${a.pages===1?"":"s"} · ${a.layout}×${a.layout}</small></button>`).join("")+"</div>":'<div class="empty">Your shelf is empty.<br>Create your first binder ✨</div>'}
function openBinder(){binderTitle.textContent=albums[current].name;renderPage();show("binder")}
function keyFor(i){return `${albums[current].id}-${pageNo}-${i}`}
function rawKey(i){return keyFor(i)+"-raw"}
function pointsKey(i){return keyFor(i)+"-points"}
function openDB(){return new Promise((ok,no)=>{let r=indexedDB.open("PocketBinderDB",1);r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains("cards"))r.result.createObjectStore("cards")};r.onsuccess=()=>{db=r.result;ok()};r.onerror=()=>no(r.error)})}
async function dbPut(k,v){if(!db)await openDB();return new Promise((ok,no)=>{let r=db.transaction("cards","readwrite").objectStore("cards").put(v,k);r.onsuccess=()=>ok();r.onerror=()=>no(r.error)})}
async function dbGet(k){if(!db)await openDB();return new Promise((ok,no)=>{let r=db.transaction("cards").objectStore("cards").get(k);r.onsuccess=()=>ok(r.result);r.onerror=()=>no(r.error)})}
async function dbDelete(k){if(!db)await openDB();return new Promise((ok,no)=>{let r=db.transaction("cards","readwrite").objectStore("cards").delete(k);r.onsuccess=()=>ok();r.onerror=()=>no(r.error)})}
function renderPage(anim=""){let a=albums[current];document.getElementById("pageLabel").textContent="";pageCount.textContent=`${pageNo} / ${a.pages}`;pageWrap.className="page-wrap "+((a.style||"clean")==="realistic"?"realistic":"");pageWrap.style.setProperty("--binder-color",a.color);page.style.gridTemplateColumns=`repeat(${a.layout},1fr)`;page.className="page "+anim;page.innerHTML=Array.from({length:a.layout*a.layout},(_,i)=>`<div class="pocket" data-slot="${i}"><span>＋</span><input type="file" accept="image/*" aria-label="Add card" onchange="directCardChosen(${i},this)"></div>`).join("");loadCards()}
async function pocketTap(i){if(longTriggered){longTriggered=false;return}let existing=await dbGet(keyFor(i));if(existing)return;openCardPicker(i)}
function openCardPicker(i){pickerSlot=i;globalCardPicker.value="";globalCardPicker.click()}
function globalCardChosen(input){let file=input.files&&input.files[0];if(!file||pickerSlot===null)return;let i=pickerSlot;pickerSlot=null;startAdjust(i,file,null)}
function directCardChosen(i,input){let file=input.files&&input.files[0];if(!file)return;input.value="";startAdjust(i,file,null)}
let holdX=0,holdY=0;function holdStart(e,i){holdX=e.clientX;holdY=e.clientY;longTriggered=false;longTimer=setTimeout(async()=>{if(await dbGet(keyFor(i))){longTriggered=true;showCardMenu(i)}},550)}function holdEnd(){clearTimeout(longTimer)}function holdMove(e){if(Math.hypot(e.clientX-holdX,e.clientY-holdY)>12)clearTimeout(longTimer)}

async function loadCard(i){let file=await dbGet(keyFor(i));if(!file)return;let pocket=page.querySelector(`[data-slot="${i}"]`);if(!pocket)return;let url=URL.createObjectURL(file);pocket.classList.add("has-card");pocket.innerHTML=`<img src="${url}" alt="Card ${i+1}">`;pocket.onpointerdown=e=>holdStart(e,i);pocket.onpointerup=holdEnd;pocket.onpointercancel=holdEnd;pocket.onpointermove=holdMove;pocket.onclick=()=>{if(longTriggered){longTriggered=false;return}}}
async function loadCards(){for(let i=0;i<albums[current].layout*albums[current].layout;i++)await loadCard(i)}
function showCardMenu(i){menuSlot=i;cardSheetBackdrop.classList.add("open")}function hideCardMenu(){cardSheetBackdrop.classList.remove("open")}function closeCardMenu(e){if(e.target===cardSheetBackdrop)hideCardMenu()}
async function deleteCard(){let i=menuSlot;hideCardMenu();if(!confirm("Delete this card?"))return;await Promise.all([dbDelete(keyFor(i)),dbDelete(rawKey(i)),dbDelete(pointsKey(i))]);renderPage()}
function replaceCard(){let i=menuSlot;hideCardMenu();openCardPicker(i)}
async function adjustExisting(){let i=menuSlot;hideCardMenu();let raw=await dbGet(rawKey(i)),pts=await dbGet(pointsKey(i));if(!raw){alert("This card was added before v0.3.1. Choose Replace photo once, then corner adjustment will be available.");return}startAdjust(i,raw,pts)}
function startAdjust(i,file,pts){adjustSlot=i;adjustFile=file;let img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{adjustImage=img;openAdjust(pts);URL.revokeObjectURL(url)};img.src=url}
function openAdjust(saved){adjustModal.classList.add("open");requestAnimationFrame(()=>{let stage=adjustStage.getBoundingClientRect(),maxW=stage.width,maxH=stage.height,scale=Math.min(maxW/adjustImage.naturalWidth,maxH/adjustImage.naturalHeight);adjustCanvas.width=Math.round(adjustImage.naturalWidth*scale);adjustCanvas.height=Math.round(adjustImage.naturalHeight*scale);adjustCanvas.style.width=adjustCanvas.width+"px";adjustCanvas.style.height=adjustCanvas.height+"px";adjustCanvas.getContext("2d").drawImage(adjustImage,0,0,adjustCanvas.width,adjustCanvas.height);adjustPoints=saved||[[.08,.08],[.92,.08],[.92,.92],[.08,.92]];setupCorners()})}
function canvasBox(){return adjustCanvas.getBoundingClientRect()}
function setupCorners(){document.querySelectorAll(".corner").forEach((c,i)=>{placeCorner(c,i);c.onpointerdown=e=>dragCorner(e,c,i)});drawQuad()}
function placeCorner(c,i){let b=canvasBox(),s=adjustStage.getBoundingClientRect();c.style.left=(b.left-s.left+adjustPoints[i][0]*b.width)+"px";c.style.top=(b.top-s.top+adjustPoints[i][1]*b.height)+"px"}
function dragCorner(e,c,i){e.preventDefault();c.setPointerCapture(e.pointerId);c.onpointermove=ev=>{let b=canvasBox(),x=Math.max(0,Math.min(b.width,ev.clientX-b.left)),y=Math.max(0,Math.min(b.height,ev.clientY-b.top));adjustPoints[i]=[x/b.width,y/b.height];placeCorner(c,i);drawQuad()};c.onpointerup=()=>c.onpointermove=null}
function drawQuad(){quadLines.innerHTML="";let b=canvasBox(),s=adjustStage.getBoundingClientRect();for(let i=0;i<4;i++){let j=(i+1)%4,x1=b.left-s.left+adjustPoints[i][0]*b.width,y1=b.top-s.top+adjustPoints[i][1]*b.height,x2=b.left-s.left+adjustPoints[j][0]*b.width,y2=b.top-s.top+adjustPoints[j][1]*b.height,l=document.createElement("div"),d=Math.hypot(x2-x1,y2-y1);l.className="quadLine";l.style.left=x1+"px";l.style.top=y1+"px";l.style.width=d+"px";l.style.transform=`rotate(${Math.atan2(y2-y1,x2-x1)}rad)`;quadLines.appendChild(l)}}
function cancelAdjust(){adjustModal.classList.remove("open");adjustFile=null}
function solve8(A,b){for(let i=0;i<8;i++){let m=i;for(let r=i+1;r<8;r++)if(Math.abs(A[r][i])>Math.abs(A[m][i]))m=r;[A[i],A[m]]=[A[m],A[i]];[b[i],b[m]]=[b[m],b[i]];let p=A[i][i];if(Math.abs(p)<1e-10)throw Error("Invalid corners");for(let c=i;c<8;c++)A[i][c]/=p;b[i]/=p;for(let r=0;r<8;r++)if(r!==i){let f=A[r][i];for(let c=i;c<8;c++)A[r][c]-=f*A[i][c];b[r]-=f*b[i]}}return b}
function homography(dst,src){let A=[],b=[];for(let i=0;i<4;i++){let [x,y]=dst[i],[u,v]=src[i];A.push([x,y,1,0,0,0,-u*x,-u*y]);b.push(u);A.push([0,0,0,x,y,1,-v*x,-v*y]);b.push(v)}let h=solve8(A,b);return [...h,1]}
async function saveAdjust(){let doneBtn=document.querySelector(".modalBtn.done");if(doneBtn.disabled)return;doneBtn.disabled=true;doneBtn.textContent="Saving…";await new Promise(r=>setTimeout(r,40));try{let W=378,H=528,src=adjustPoints.map(p=>[p[0]*adjustImage.naturalWidth,p[1]*adjustImage.naturalHeight]),dst=[[0,0],[W-1,0],[W-1,H-1],[0,H-1]],h=homography(dst,src),source=document.createElement("canvas");source.width=adjustImage.naturalWidth;source.height=adjustImage.naturalHeight;source.getContext("2d").drawImage(adjustImage,0,0);let sd=source.getContext("2d").getImageData(0,0,source.width,source.height),out=document.createElement("canvas");out.width=W;out.height=H;let ctx=out.getContext("2d"),od=ctx.createImageData(W,H);for(let y=0;y<H;y++)for(let x=0;x<W;x++){let z=h[6]*x+h[7]*y+1,sx=(h[0]*x+h[1]*y+h[2])/z,sy=(h[3]*x+h[4]*y+h[5])/z,ix=Math.max(0,Math.min(source.width-1,Math.round(sx))),iy=Math.max(0,Math.min(source.height-1,Math.round(sy))),si=(iy*source.width+ix)*4,di=(y*W+x)*4;od.data[di]=sd.data[si];od.data[di+1]=sd.data[si+1];od.data[di+2]=sd.data[si+2];od.data[di+3]=255}ctx.putImageData(od,0,0);let blob=await new Promise(ok=>out.toBlob(ok,"image/jpeg",.9));await dbPut(keyFor(adjustSlot),blob);await dbPut(rawKey(adjustSlot),adjustFile);await dbPut(pointsKey(adjustSlot),adjustPoints);adjustModal.classList.remove("open");renderPage()}catch(e){console.error(e);alert("Could not save this card. Try moving the corners again.")}finally{doneBtn.disabled=false;doneBtn.textContent="Done"}}
function addPage(){albums[current].pages++;pageNo=albums[current].pages;save();renderPage("slide-left")}
function nextPage(){if(pageNo<albums[current].pages){pageNo++;renderPage("slide-left")}else bump("edge-left")}
function prevPage(){if(pageNo>1){pageNo--;renderPage("slide-right")}else bump("edge-right")}
function bump(c){page.classList.remove("edge-left","edge-right");void page.offsetWidth;page.classList.add(c)}
let touchX=0,touchY=0;pageWrap.addEventListener("touchstart",e=>{touchX=e.changedTouches[0].clientX;touchY=e.changedTouches[0].clientY},{passive:true});pageWrap.addEventListener("touchend",e=>{let dx=e.changedTouches[0].clientX-touchX,dy=e.changedTouches[0].clientY-touchY;if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.3)(dx<0?nextPage():prevPage())},{passive:true});openDB();
</script></body></html>
